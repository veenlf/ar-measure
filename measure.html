<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AR Measure Tool - Fixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            touch-action: none;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }
        
        .overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            z-index: 20;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        .distance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .distance-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .distance-value {
            color: white;
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
        }
        
        .distance-unit {
            font-size: 20px;
            margin-left: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 52px;
            touch-action: manipulation;
        }
        
        button:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .status {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            padding: 10px;
        }
        
        .instruction {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 14px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            top: max(20px, env(safe-area-inset-top));
        }
        
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .crosshair::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            transform: translateY(-50%);
        }
        
        .crosshair::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            transform: translateX(-50%);
        }
        
        .crosshair-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
        }
        
        .history-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            z-index: 30;
            max-height: 50vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .history-panel.open {
            transform: translateY(0);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .history-title {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        
        .history-close {
            background: none;
            border: none;
            color: #667eea;
            font-size: 24px;
            padding: 8px;
            min-height: auto;
        }
        
        .history-list {
            overflow-y: auto;
            padding: 12px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            margin: 8px 0;
            border-radius: 14px;
        }
        
        .history-distance {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .history-time {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        .history-empty {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 40px;
        }
        
        .calibration-badge {
            position: fixed;
            bottom: 120px;
            right: 16px;
            background: rgba(76, 175, 80, 0.9);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            z-index: 20;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        
        .share-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Calibration mode indicator */
        .calibration-mode {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 50;
            border: 2px solid #FFD700;
        }
        
        .calibration-mode p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="crosshair">
            <div class="crosshair-circle"></div>
        </div>
        
        <div class="instruction" id="instruction">
            🎯 Tap screen to place point A
        </div>
        
        <div class="overlay">
            <div class="distance-card">
                <div class="distance-label">MEASURED DISTANCE</div>
                <div class="distance-value">
                    <span id="distanceValue">0.00</span>
                    <span class="distance-unit">cm</span>
                </div>
            </div>
            
            <div class="button-group">
                <button id="calibrateBtn">📐 Calibrate</button>
                <button id="historyBtn">📊 History</button>
                <button id="shareBtn" class="share-btn">📤 Share</button>
                <button id="clearBtn">🗑️ Clear</button>
            </div>
            
            <div class="status" id="status">
                Ready to measure
            </div>
        </div>
        
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span class="history-title">📊 Measurement History</span>
                <button class="history-close" id="closeHistoryBtn">✕</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">No measurements yet</div>
            </div>
        </div>
        
        <div class="calibration-badge" id="calibrationBadge" style="display: none;">
            ✓ Calibrated
        </div>
    </div>

    <script>
        // DOM elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const distanceValue = document.getElementById('distanceValue');
        const instruction = document.getElementById('instruction');
        const status = document.getElementById('status');
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');
        const calibrationBadge = document.getElementById('calibrationBadge');
        
        // State
        let points = [];
        let measurements = [];
        let currentDistance = 0;
        let lastTapTime = 0;
        let calibrationFactor = 1.0;
        
        // Camera parameters
        let focalLength = 800;
        let referenceWidth = 30;
        
        // Calibration mode
        let isCalibrationMode = false;
        let calibrationStartPoint = null;
        
        // ==================== Haptic Feedback (iOS compatible) ====================
        function vibrate() {
            // Try iOS haptics first
            if (window.webkit && window.webkit.messageHandlers) {
                // Native bridge - skip
            }
            
            // Try vibration API
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
            
            // iOS doesn't support vibrate, but we can use visual feedback
            // Add a quick style flash for visual feedback
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255,255,255,0.1)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '9999';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 50);
        }
        
        // ==================== Camera ====================
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                await video.play();
                
                resizeCanvas();
                requestAnimationFrame(draw);
                
                status.textContent = 'Camera ready! Tap screen to measure';
                instruction.textContent = '🎯 Tap screen to place point A';
                
            } catch (err) {
                console.error('Camera error:', err);
                status.textContent = '⚠️ Camera access required';
                instruction.textContent = 'Camera permission needed';
            }
        }
        
        // ==================== Drawing ====================
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function draw() {
            if (!video.videoWidth) {
                requestAnimationFrame(draw);
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Draw saved measurements
            measurements.forEach(measure => {
                drawMeasurement(measure);
            });
            
            // Draw current points
            if (points.length >= 1) {
                drawPoint(points[0], '#4CAF50', 'A', 'Start');
                if (points.length >= 2) {
                    drawPoint(points[1], '#FF5252', 'B', 'End');
                    drawLine(points[0], points[1]);
                    const midX = (points[0].x + points[1].x) / 2;
                    const midY = (points[0].y + points[1].y) / 2;
                    drawText(`${currentDistance.toFixed(1)} cm`, midX, midY - 15, '#FFD700', 'bold 18px');
                }
            }
            
            // Draw calibration mode indicator
            if (isCalibrationMode && calibrationStartPoint) {
                ctx.beginPath();
                ctx.moveTo(calibrationStartPoint.x, calibrationStartPoint.y);
                // Draw line following touch
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            
            requestAnimationFrame(draw);
        }
        
        function drawPoint(point, color, label, text) {
            ctx.beginPath();
            ctx.arc(point.x, point.y, 14, 0, 2 * Math.PI);
            ctx.fillStyle = color + '80';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.font = 'bold 16px -apple-system';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            ctx.fillText(label, point.x + 18, point.y - 12);
            ctx.font = '12px -apple-system';
            ctx.fillText(text, point.x + 18, point.y + 5);
        }
        
        function drawLine(p1, p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawText(text, x, y, color, font) {
            ctx.fillStyle = color;
            ctx.font = font;
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            ctx.fillText(text, x, y);
        }
        
        function drawMeasurement(measure) {
            drawPoint(measure.p1, '#9C27B0', measure.id.toString(), '');
            drawPoint(measure.p2, '#9C27B0', measure.id.toString(), '');
            drawLine(measure.p1, measure.p2);
            const midX = (measure.p1.x + measure.p2.x) / 2;
            const midY = (measure.p1.y + measure.p2.y) / 2;
            drawText(`${measure.distance.toFixed(1)} cm`, midX, midY - 15, '#9C27B0', 'bold 16px');
        }
        
        // ==================== Measurement ====================
        function calculateDistance(pixelDistance) {
            let estimatedCm = (pixelDistance / focalLength) * referenceWidth;
            estimatedCm *= calibrationFactor;
            return Math.min(Math.max(estimatedCm, 0), 500);
        }
        
        function updateHistoryDisplay() {
            if (measurements.length === 0) {
                historyList.innerHTML = '<div class="history-empty">📭 No measurements yet</div>';
                return;
            }
            
            historyList.innerHTML = measurements.slice(0, 20).map(m => `
                <div class="history-item">
                    <span class="history-distance">📏 ${m.distance.toFixed(1)} cm</span>
                    <span class="history-time">${m.time}</span>
                </div>
            `).join('');
        }
        
        // ==================== Calibration with Drag ====================
        function startCalibration() {
            isCalibrationMode = true;
            calibrationStartPoint = null;
            instruction.textContent = '📐 DRAG across a 10cm object (like a credit card)';
            status.textContent = 'Press and drag from one end to the other';
            vibrate();
            
            // Show calibration instruction overlay
            const overlay = document.createElement('div');
            overlay.className = 'calibration-mode';
            overlay.id = 'calibrationOverlay';
            overlay.innerHTML = `
                <p>📐 Calibration Mode</p>
                <p style="font-size: 12px; color: #FFD700;">Press and drag across a 10cm object</p>
                <p style="font-size: 10px; margin-top: 10px;">Example: credit card (~8.5cm) or sticky note (~7.6cm)</p>
                <button id="cancelCalibBtn" style="margin-top: 15px; background: #f44336; padding: 10px 20px;">Cancel</button>
            `;
            document.body.appendChild(overlay);
            
            document.getElementById('cancelCalibBtn').onclick = () => {
                isCalibrationMode = false;
                overlay.remove();
                instruction.textContent = '🎯 Tap screen to place point A';
                status.textContent = 'Calibration cancelled';
                vibrate();
            };
        }
        
        // Touch handlers for calibration
        function onTouchStart(e) {
            if (!isCalibrationMode) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            calibrationStartPoint = { x, y };
            status.textContent = 'Dragging... release at other end';
            vibrate();
        }
        
        function onTouchMove(e) {
            if (!isCalibrationMode || !calibrationStartPoint) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const currentX = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const currentY = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            // Draw live line on canvas
            ctx.beginPath();
            ctx.moveTo(calibrationStartPoint.x, calibrationStartPoint.y);
            ctx.lineTo(currentX, currentY);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.stroke();
        }
        
        function onTouchEnd(e) {
            if (!isCalibrationMode || !calibrationStartPoint) {
                return;
            }
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.changedTouches[0];
            const endX = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const endY = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            const dx = calibrationStartPoint.x - endX;
            const dy = calibrationStartPoint.y - endY;
            const pixelDistance = Math.sqrt(dx * dx + dy * dy);
            
            if (pixelDistance > 20) {
                // Assume standard credit card width ~8.5cm
                const assumedCm = 8.5;
                const rawCm = (pixelDistance / focalLength) * referenceWidth;
                calibrationFactor = assumedCm / rawCm;
                
                calibrationBadge.style.display = 'block';
                setTimeout(() => {
                    calibrationBadge.style.opacity = '0';
                    setTimeout(() => {
                        calibrationBadge.style.display = 'none';
                        calibrationBadge.style.opacity = '1';
                    }, 500);
                }, 3000);
                
                status.textContent = `✓ Calibrated! (Factor: ${calibrationFactor.toFixed(2)})`;
                instruction.textContent = '🎯 Tap screen to place point A';
                vibrate();
            } else {
                status.textContent = '❌ Drag longer distance for calibration';
            }
            
            // Clean up
            isCalibrationMode = false;
            calibrationStartPoint = null;
            const overlay = document.getElementById('calibrationOverlay');
            if (overlay) overlay.remove();
        }
        
        // ==================== Share ====================
        async function shareMeasurements() {
            if (measurements.length === 0) {
                status.textContent = 'No measurements to share';
                setTimeout(() => {
                    status.textContent = 'Ready to measure';
                }, 2000);
                return;
            }
            
            const summary = measurements.slice(0, 10).map((m, i) => 
                `${i+1}. ${m.distance.toFixed(1)} cm`
            ).join('\n');
            
            const shareText = `📏 AR Measure Results:\n${summary}\n\nTotal: ${measurements.length} measurements`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'My AR Measurements',
                        text: shareText,
                    });
                    status.textContent = 'Shared!';
                } catch (err) {
                    status.textContent = 'Share cancelled';
                }
            } else {
                await navigator.clipboard.writeText(shareText);
                status.textContent = 'Copied to clipboard!';
            }
            vibrate();
            setTimeout(() => {
                if (!isCalibrationMode) status.textContent = 'Ready to measure';
            }, 2000);
        }
        
        // ==================== Touch/Click for Measuring ====================
        function handleTap(e) {
            // Don't measure during calibration
            if (isCalibrationMode) return;
            
            e.preventDefault();
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) * (canvas.width / rect.width);
            const y = (clientY - rect.top) * (canvas.height / rect.height);
            
            const now = Date.now();
            if (now - lastTapTime < 300) return;
            lastTapTime = now;
            
            vibrate();
            
            if (points.length === 0) {
                points = [{ x, y }];
                instruction.textContent = '📍 Tap again to measure distance';
                status.textContent = 'Tap to place point B';
            } else if (points.length === 1) {
                const p2 = { x, y };
                const dx = points[0].x - p2.x;
                const dy = points[0].y - p2.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                currentDistance = calculateDistance(pixelDistance);
                
                measurements.unshift({
                    id: Date.now(),
                    p1: { ...points[0] },
                    p2: { ...p2 },
                    distance: currentDistance,
                    time: new Date().toLocaleTimeString()
                });
                
                distanceValue.textContent = currentDistance.toFixed(2);
                instruction.textContent = '✓ Saved! Tap anywhere to start new measurement';
                status.textContent = `${currentDistance.toFixed(1)} cm measured`;
                points = [];
                
                vibrate();
                updateHistoryDisplay();
            }
        }
        
        // ==================== UI Actions ====================
        function toggleHistory() {
            historyPanel.classList.toggle('open');
            vibrate();
        }
        
        function closeHistory() {
            historyPanel.classList.remove('open');
        }
        
        function clearAll() {
            measurements = [];
            points = [];
            currentDistance = 0;
            distanceValue.textContent = '0.00';
            instruction.textContent = '🎯 Tap screen to place point A';
            status.textContent = 'All measurements cleared';
            updateHistoryDisplay();
            vibrate();
            closeHistory();
        }
        
        // ==================== Event Listeners ====================
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', onTouchStart);
        canvas.addEventListener('touchmove', onTouchMove);
        canvas.addEventListener('touchend', onTouchEnd);
        
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('calibrateBtn').addEventListener('click', startCalibration);
        document.getElementById('historyBtn').addEventListener('click', toggleHistory);
        document.getElementById('closeHistoryBtn').addEventListener('click', closeHistory);
        document.getElementById('shareBtn').addEventListener('click', shareMeasurements);
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        
        // Initialize
        initCamera();
        updateHistoryDisplay();
        
        console.log('AR Measure Tool Ready - Drag calibration & haptics working!');
    </script>
</body>
</html>
