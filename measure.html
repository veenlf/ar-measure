<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AR Measure Tool - Drag & Edit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            touch-action: none;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }
        
        .overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            z-index: 20;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        .distance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .distance-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .distance-value {
            color: white;
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
        }
        
        .distance-unit {
            font-size: 20px;
            margin-left: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 52px;
            touch-action: manipulation;
        }
        
        button:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .status {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            padding: 10px;
        }
        
        .instruction {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 14px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            top: max(20px, env(safe-area-inset-top));
        }
        
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .crosshair::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            transform: translateY(-50%);
        }
        
        .crosshair::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            transform: translateX(-50%);
        }
        
        .crosshair-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
        }
        
        .history-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            z-index: 30;
            max-height: 50vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .history-panel.open {
            transform: translateY(0);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .history-title {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        
        .history-close {
            background: none;
            border: none;
            color: #667eea;
            font-size: 24px;
            padding: 8px;
            min-height: auto;
        }
        
        .history-list {
            overflow-y: auto;
            padding: 12px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            margin: 8px 0;
            border-radius: 14px;
        }
        
        .history-distance {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .history-time {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        .history-empty {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 40px;
        }
        
        .calibration-badge {
            position: fixed;
            bottom: 120px;
            right: 16px;
            background: rgba(76, 175, 80, 0.9);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            z-index: 20;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="crosshair">
            <div class="crosshair-circle"></div>
        </div>
        
        <div class="instruction" id="instruction">
            👆 PRESS AND DRAG to measure
        </div>
        
        <div class="overlay">
            <div class="distance-card">
                <div class="distance-label">MEASURED DISTANCE</div>
                <div class="distance-value">
                    <span id="distanceValue">0.00</span>
                    <span class="distance-unit">cm</span>
                </div>
            </div>
            
            <div class="button-group">
                <button id="calibrateBtn">📐 Calibrate</button>
                <button id="historyBtn">📊 History</button>
                <button id="shareBtn" class="share-btn">📤 Share</button>
                <button id="clearBtn">🗑️ Clear</button>
            </div>
            
            <div class="status" id="status">
                Press and drag to measure
            </div>
        </div>
        
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span class="history-title">📊 Measurement History</span>
                <button class="history-close" id="closeHistoryBtn">✕</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">No measurements yet</div>
            </div>
        </div>
        
        <div class="calibration-badge" id="calibrationBadge" style="display: none;">
            ✓ Calibrated
        </div>
    </div>

    <script>
        // ==================== DOM Elements ====================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const distanceValue = document.getElementById('distanceValue');
        const instruction = document.getElementById('instruction');
        const status = document.getElementById('status');
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');
        const calibrationBadge = document.getElementById('calibrationBadge');
        
        // ==================== State ====================
        let measurements = [];
        let currentDistance = 0;
        let calibrationFactor = 1.0;
        
        // Drag state for NEW measurements
        let isDragging = false;
        let dragStart = null;
        let dragCurrent = null;
        
        // Edit state for EXISTING measurements
        let isEditing = false;
        let editingMeasurement = null;
        let editingPoint = null; // 'start' or 'end'
        
        // Camera parameters
        let focalLength = 800;
        let referenceWidth = 30;
        
        // ==================== Haptic Feedback (Visual + Vibration) ====================
        function hapticLight() {
            // Visual flash
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255, 255, 255, 0.15)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '9999';
            flash.style.transition = 'opacity 0.1s';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 100);
            }, 10);
            
            // Vibration for supported devices
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }
        
        function hapticMedium() {
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255, 255, 255, 0.25)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '9999';
            flash.style.transition = 'opacity 0.1s';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 100);
            }, 10);
            
            if (navigator.vibrate) {
                navigator.vibrate(20);
            }
        }
        
        function hapticHeavy() {
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255, 215, 0, 0.3)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '9999';
            flash.style.transition = 'opacity 0.15s';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 150);
            }, 10);
            
            if (navigator.vibrate) {
                navigator.vibrate(40);
            }
        }
        
        // ==================== Camera ====================
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                await video.play();
                
                resizeCanvas();
                requestAnimationFrame(draw);
                
                status.textContent = 'Camera ready! Press and drag to measure';
                instruction.textContent = '👆 PRESS AND DRAG to measure | ✏️ Tap circle to edit';
                hapticLight();
                
            } catch (err) {
                console.error('Camera error:', err);
                status.textContent = '⚠️ Camera access required';
                instruction.textContent = 'Camera permission needed';
            }
        }
        
        // ==================== Drawing ====================
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function draw() {
            if (!video.videoWidth) {
                requestAnimationFrame(draw);
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Draw saved measurements
            measurements.forEach(measure => {
                drawMeasurement(measure);
            });
            
            // Draw current drag line (new measurement)
            if (isDragging && dragStart && dragCurrent) {
                drawDragLine(dragStart, dragCurrent);
                
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                const liveDistance = calculateDistance(pixelDistance);
                
                const midX = (dragStart.x + dragCurrent.x) / 2;
                const midY = (dragStart.y + dragCurrent.y) / 2 - 20;
                drawText(`${liveDistance.toFixed(1)} cm`, midX, midY, '#FFD700', 'bold 20px');
                
                drawPoint(dragStart, '#4CAF50', 'A', 'Start');
                drawPoint(dragCurrent, '#FF5252', 'B', 'End');
            }
            
            // Draw editing highlight
            if (isEditing && editingMeasurement) {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#FFD700';
                drawPoint(editingMeasurement.start, '#FFD700', 'A', 'Start');
                drawPoint(editingMeasurement.end, '#FFD700', 'B', 'End');
                ctx.restore();
            }
            
            requestAnimationFrame(draw);
        }
        
        function drawPoint(point, color, label, text) {
            ctx.beginPath();
            ctx.arc(point.x, point.y, 16, 0, 2 * Math.PI);
            ctx.fillStyle = color + '80';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.font = 'bold 16px -apple-system';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            ctx.fillText(label, point.x + 18, point.y - 12);
            ctx.font = '12px -apple-system';
            ctx.fillText(text, point.x + 18, point.y + 5);
        }
        
        function drawDragLine(p1, p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 6;
            ctx.setLineDash([10, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawLine(p1, p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawText(text, x, y, color, font) {
            ctx.fillStyle = color;
            ctx.font = font;
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            ctx.fillText(text, x, y);
        }
        
        function drawMeasurement(measure) {
            drawPoint(measure.start, '#9C27B0', measure.id.toString(), '');
            drawPoint(measure.end, '#9C27B0', measure.id.toString(), '');
            drawLine(measure.start, measure.end);
            const midX = (measure.start.x + measure.end.x) / 2;
            const midY = (measure.start.y + measure.end.y) / 2;
            drawText(`${measure.distance.toFixed(1)} cm`, midX, midY - 15, '#9C27B0', 'bold 16px');
        }
        
        // ==================== Measurement Calculation ====================
        function calculateDistance(pixelDistance) {
            let estimatedCm = (pixelDistance / focalLength) * referenceWidth;
            estimatedCm *= calibrationFactor;
            return Math.min(Math.max(estimatedCm, 0), 500);
        }
        
        function updateMeasurementDistance(measure) {
            const dx = measure.start.x - measure.end.x;
            const dy = measure.start.y - measure.end.y;
            const pixelDistance = Math.sqrt(dx * dx + dy * dy);
            measure.distance = calculateDistance(pixelDistance);
            return measure.distance;
        }
        
        function updateHistoryDisplay() {
            if (measurements.length === 0) {
                historyList.innerHTML = '<div class="history-empty">📭 No measurements yet\nPress and drag to measure!</div>';
                return;
            }
            
            historyList.innerHTML = measurements.slice(0, 20).map(m => `
                <div class="history-item">
                    <span class="history-distance">📏 ${m.distance.toFixed(1)} cm</span>
                    <span class="history-time">${m.time}</span>
                </div>
            `).join('');
        }
        
        // ==================== Find point under finger ====================
        function findPointAt(x, y) {
            const threshold = 30; // Pixels tolerance
            for (let i = 0; i < measurements.length; i++) {
                const m = measurements[i];
                
                // Check start point
                const startDx = m.start.x - x;
                const startDy = m.start.y - y;
                const startDist = Math.sqrt(startDx * startDx + startDy * startDy);
                if (startDist < threshold) {
                    return { measurement: m, point: 'start', index: i };
                }
                
                // Check end point
                const endDx = m.end.x - x;
                const endDy = m.end.y - y;
                const endDist = Math.sqrt(endDx * endDx + endDy * endDy);
                if (endDist < threshold) {
                    return { measurement: m, point: 'end', index: i };
                }
            }
            return null;
        }
        
        // ==================== Touch Handling ====================
        function onTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            // Check if tapping on an existing point
            const hit = findPointAt(x, y);
            
            if (hit) {
                // Enter edit mode
                isEditing = true;
                editingMeasurement = hit.measurement;
                editingPoint = hit.point;
                instruction.textContent = `✏️ Moving ${editingPoint === 'start' ? 'Point A' : 'Point B'} - drag to reposition`;
                status.textContent = 'Drag to move the point';
                hapticMedium();
            } else {
                // Start new measurement
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                instruction.textContent = '📍 DRAG to measure distance';
                status.textContent = 'Drag to draw line';
                hapticLight();
            }
        }
        
        function onTouchMove(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            // Haptic feedback on every move (for both new and edit)
            hapticLight();
            
            if (isDragging) {
                dragCurrent = { x, y };
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                const liveDistance = calculateDistance(pixelDistance);
                distanceValue.textContent = liveDistance.toFixed(2);
            }
            
            if (isEditing && editingMeasurement && editingPoint) {
                // Update the point position
                if (editingPoint === 'start') {
                    editingMeasurement.start = { x, y };
                } else {
                    editingMeasurement.end = { x, y };
                }
                // Recalculate distance
                const newDistance = updateMeasurementDistance(editingMeasurement);
                distanceValue.textContent = newDistance.toFixed(2);
                status.textContent = `${newDistance.toFixed(1)} cm (updated)`;
                updateHistoryDisplay();
            }
        }
        
        function onTouchEnd(e) {
            e.preventDefault();
            
            if (isDragging && dragStart && dragCurrent) {
                // Complete new measurement
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                const finalDistance = calculateDistance(pixelDistance);
                
                const measurement = {
                    id: measurements.length + 1,
                    start: { ...dragStart },
                    end: { ...dragCurrent },
                    distance: finalDistance,
                    time: new Date().toLocaleTimeString()
                };
                
                measurements.unshift(measurement);
                distanceValue.textContent = finalDistance.toFixed(2);
                instruction.textContent = '✓ Saved! Press and drag again to measure';
                status.textContent = `${finalDistance.toFixed(1)} cm measured`;
                updateHistoryDisplay();
                hapticHeavy();
            }
            
            if (isEditing && editingMeasurement) {
                // Final haptic for edit complete
                const finalDistance = editingMeasurement.distance;
                instruction.textContent = '✓ Point moved! Press and drag for new measurement';
                status.textContent = `Updated: ${finalDistance.toFixed(1)} cm`;
                hapticHeavy();
            }
            
            // Reset all drag/edit states
            isDragging = false;
            isEditing = false;
            dragStart = null;
            dragCurrent = null;
            editingMeasurement = null;
            editingPoint = null;
            
            // Reset instruction after delay
            setTimeout(() => {
                if (!isDragging && !isEditing) {
                    instruction.textContent = '👆 PRESS AND DRAG to measure | ✏️ Tap circle to edit';
                }
            }, 2000);
        }
        
        // ==================== Calibration ====================
        function startCalibration() {
            instruction.textContent = '📐 DRAG across a 10cm object (credit card ~8.5cm)';
            status.textContent = 'Drag to calibrate - use a known length object';
            hapticMedium();
            
            let calStart = null;
            let calEnd = null;
            
            const handleCalStart = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
                const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
                calStart = { x, y };
                status.textContent = 'Drag to the other end...';
                hapticLight();
            };
            
            const handleCalMove = (e) => {
                if (!calStart) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
                const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
                calEnd = { x, y };
                hapticLight();
                
                // Draw preview
                ctx.beginPath();
                ctx.moveTo(calStart.x, calStart.y);
                ctx.lineTo(calEnd.x, calEnd.y);
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 4;
                ctx.stroke();
            };
            
            const handleCalEnd = (e) => {
                if (!calStart || !calEnd) {
                    cleanup();
                    return;
                }
                
                e.preventDefault();
                const dx = calStart.x - calEnd.x;
                const dy = calStart.y - calEnd.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                
                if (pixelDistance > 30) {
                    const assumedCm = 8.5;
                    const rawCm = (pixelDistance / focalLength) * referenceWidth;
                    calibrationFactor = assumedCm / rawCm;
                    
                    calibrationBadge.style.display = 'block';
                    setTimeout(() => {
                        calibrationBadge.style.opacity = '0';
                        setTimeout(() => {
                            calibrationBadge.style.display = 'none';
                            calibrationBadge.style.opacity = '1';
                        }, 500);
                    }, 3000);
                    
                    status.textContent = `✓ Calibrated! Measurements will be more accurate.`;
                    instruction.textContent = '👆 PRESS AND DRAG to measure | ✏️ Tap circle to edit';
                    hapticHeavy();
                } else {
                    status.textContent = '❌ Drag a longer distance for calibration';
                    setTimeout(() => {
                        status.textContent = 'Press and drag to measure';
                    }, 2000);
                }
                
                cleanup();
            };
            
            const cleanup = () => {
                canvas.removeEventListener('touchstart', handleCalStart);
                canvas.removeEventListener('touchmove', handleCalMove);
                canvas.removeEventListener('touchend', handleCalEnd);
            };
            
            canvas.addEventListener('touchstart', handleCalStart);
            canvas.addEventListener('touchmove', handleCalMove);
            canvas.addEventListener('touchend', handleCalEnd);
        }
        
        // ==================== Share ====================
        async function shareMeasurements() {
            if (measurements.length === 0) {
                status.textContent = 'No measurements to share';
                setTimeout(() => status.textContent = 'Press and drag to measure', 2000);
                return;
            }
            
            const summary = measurements.slice(0, 10).map((m, i) => 
                `${i+1}. ${m.distance.toFixed(1)} cm`
            ).join('\n');
            
            const shareText = `📏 AR Measure Results:\n${summary}\n\nTotal: ${measurements.length} measurements`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'My AR Measurements',
                        text: shareText,
                    });
                    status.textContent = 'Shared!';
                    hapticMedium();
                } catch (err) {
                    status.textContent = 'Share cancelled';
                }
            } else {
                await navigator.clipboard.writeText(shareText);
                status.textContent = 'Copied to clipboard!';
                hapticLight();
            }
            
            setTimeout(() => {
                if (!isDragging && !isEditing) status.textContent = 'Press and drag to measure';
            }, 2000);
        }
        
        // ==================== UI Actions ====================
        function toggleHistory() {
            historyPanel.classList.toggle('open');
            hapticLight();
        }
        
        function closeHistory() {
            historyPanel.classList.remove('open');
        }
        
        function clearAll() {
            measurements = [];
            currentDistance = 0;
            distanceValue.textContent = '0.00';
            instruction.textContent = '👆 PRESS AND DRAG to measure | ✏️ Tap circle to edit';
            status.textContent = 'All measurements cleared';
            updateHistoryDisplay();
            hapticMedium();
            closeHistory();
        }
        
        // ==================== Event Listeners ====================
        canvas.addEventListener('touchstart', onTouchStart);
        canvas.addEventListener('touchmove', onTouchMove);
        canvas.addEventListener('touchend', onTouchEnd);
        
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('calibrateBtn').addEventListener('click', startCalibration);
        document.getElementById('historyBtn').addEventListener('click', toggleHistory);
        document.getElementById('closeHistoryBtn').addEventListener('click', closeHistory);
        document.getElementById('shareBtn').addEventListener('click', shareMeasurements);
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        
        // Initialize
        initCamera();
        updateHistoryDisplay();
        
        console.log('AR Measure Tool Ready - Drag to measure with haptic feedback! Tap circles to edit points!');
    </script>
</body>
</html>
