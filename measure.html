<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Measure Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        .overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            z-index: 20;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .distance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .distance-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .distance-value {
            color: white;
            font-size: 42px;
            font-weight: bold;
            font-family: monospace;
        }
        
        .distance-unit {
            font-size: 18px;
            margin-left: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        button {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .status {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            padding: 10px;
        }
        
        .instruction {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-size: 13px;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }
        
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
        }
        
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .crosshair::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            transform: translateY(-50%);
        }
        
        .crosshair::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            transform: translateX(-50%);
        }
        
        .crosshair-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="crosshair">
            <div class="crosshair-circle"></div>
        </div>
        
        <div class="instruction" id="instruction">
            🎯 Tap screen to place point A
        </div>
        
        <div class="overlay">
            <div class="distance-card">
                <div class="distance-label">MEASURED DISTANCE</div>
                <div class="distance-value">
                    <span id="distanceValue">0.00</span>
                    <span class="distance-unit">cm</span>
                </div>
            </div>
            
            <div class="button-group">
                <button id="clearBtn">🗑️ Clear All</button>
                <button id="resetBtn">🔄 New Measurement</button>
            </div>
            
            <div class="status" id="status">
                Ready to measure
            </div>
        </div>
    </div>

    <script>
        // DOM elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const distanceValue = document.getElementById('distanceValue');
        const instruction = document.getElementById('instruction');
        const status = document.getElementById('status');
        
        // State
        let points = [];
        let measurements = [];
        let currentDistance = 0;
        let lastTapTime = 0;
        
        // Camera parameters
        let focalLength = 800;
        let referenceWidth = 30;
        
        // Initialize camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                await video.play();
                
                resizeCanvas();
                requestAnimationFrame(draw);
                
                status.textContent = 'Camera ready! Tap screen to measure';
                instruction.textContent = '🎯 Tap screen to place point A';
                
            } catch (err) {
                console.error('Camera error:', err);
                status.textContent = '⚠️ Camera access required. Please allow camera permission.';
                instruction.textContent = 'Camera permission needed';
            }
        }
        
        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        // Draw everything
        function draw() {
            if (!video.videoWidth) {
                requestAnimationFrame(draw);
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Draw saved measurements
            measurements.forEach(measure => {
                drawMeasurement(measure);
            });
            
            // Draw current points
            if (points.length >= 1) {
                drawPoint(points[0], '#4CAF50', 'A', 'Start');
                if (points.length >= 2) {
                    drawPoint(points[1], '#FF5252', 'B', 'End');
                    drawLine(points[0], points[1]);
                    const midX = (points[0].x + points[1].x) / 2;
                    const midY = (points[0].y + points[1].y) / 2;
                    drawText(`${currentDistance.toFixed(1)} cm`, midX, midY - 15, '#FFD700', 'bold 18px');
                }
            }
            
            requestAnimationFrame(draw);
        }
        
        function drawPoint(point, color, label, text) {
            ctx.beginPath();
            ctx.arc(point.x, point.y, 12, 0, 2 * Math.PI);
            ctx.fillStyle = color + '80';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.font = 'bold 14px -apple-system';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            ctx.fillText(label, point.x + 15, point.y - 10);
            ctx.fillText(text, point.x + 15, point.y + 5);
        }
        
        function drawLine(p1, p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawText(text, x, y, color, font) {
            ctx.fillStyle = color;
            ctx.font = font;
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            ctx.fillText(text, x, y);
        }
        
        function drawMeasurement(measure) {
            drawPoint(measure.p1, '#9C27B0', measure.id.toString(), '');
            drawPoint(measure.p2, '#9C27B0', measure.id.toString(), '');
            drawLine(measure.p1, measure.p2);
            const midX = (measure.p1.x + measure.p2.x) / 2;
            const midY = (measure.p1.y + measure.p2.y) / 2;
            drawText(`${measure.distance.toFixed(1)} cm`, midX, midY - 15, '#9C27B0', 'bold 16px');
        }
        
        function calculateDistance(pixelDistance) {
            const screenWidth = Math.min(canvas.width, canvas.height);
            const estimatedCm = (pixelDistance / focalLength) * referenceWidth;
            return Math.min(Math.max(estimatedCm, 0), 300);
        }
        
        function handleTap(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            const now = Date.now();
            if (now - lastTapTime < 300) return;
            lastTapTime = now;
            
            if (points.length === 0) {
                points = [{ x, y }];
                instruction.textContent = '📍 Tap again to measure distance';
                status.textContent = 'Tap to place point B';
            } else if (points.length === 1) {
                const p2 = { x, y };
                const dx = points[0].x - p2.x;
                const dy = points[0].y - p2.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                currentDistance = calculateDistance(pixelDistance);
                
                measurements.push({
                    id: measurements.length + 1,
                    p1: { ...points[0] },
                    p2: { ...p2 },
                    distance: currentDistance
                });
                
                distanceValue.textContent = currentDistance.toFixed(2);
                instruction.textContent = '✓ Saved! Tap anywhere to start new measurement';
                status.textContent = `${currentDistance.toFixed(1)} cm measured`;
                points = [];
            }
        }
        
        function clearAll() {
            measurements = [];
            points = [];
            currentDistance = 0;
            distanceValue.textContent = '0.00';
            instruction.textContent = '🎯 Tap screen to place point A';
            status.textContent = 'All measurements cleared';
        }
        
        function reset() {
            points = [];
            instruction.textContent = '🎯 Tap screen to place point A';
            status.textContent = 'Ready for new measurement';
        }
        
        canvas.addEventListener('click', handleTap);
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('resetBtn').addEventListener('click', reset);
        window.addEventListener('resize', resizeCanvas);
        
        initCamera();
    </script>
</body>
</html>
