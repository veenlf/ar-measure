<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AR Measure Tool - Clean & Safe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            touch-action: none;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }
        
        /* Clean, subtle animations - NO FLASHING */
        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.6; }
            100% { transform: scale(1); opacity: 0.3; }
        }
        
        @keyframes gentleFade {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }
        
        .feedback-dot {
            position: fixed;
            width: 30px;
            height: 30px;
            background: rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            animation: gentleFade 0.3s ease-out forwards;
        }
        
        .overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            z-index: 20;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        .distance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            transition: transform 0.05s ease;
        }
        
        .distance-card:active {
            transform: scale(0.99);
        }
        
        .distance-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .distance-value {
            color: white;
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
        }
        
        .distance-unit {
            font-size: 20px;
            margin-left: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
            min-height: 52px;
            touch-action: manipulation;
        }
        
        button:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .status {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            padding: 10px;
        }
        
        .instruction {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            top: max(20px, env(safe-area-inset-top));
        }
        
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
        }
        
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
        }
        
        .crosshair::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            transform: translateY(-50%);
        }
        
        .crosshair::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            transform: translateX(-50%);
        }
        
        .crosshair-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        
        .history-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            z-index: 30;
            max-height: 50vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .history-panel.open {
            transform: translateY(0);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .history-title {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        
        .history-close {
            background: none;
            border: none;
            color: #667eea;
            font-size: 24px;
            padding: 8px;
            min-height: auto;
        }
        
        .history-list {
            overflow-y: auto;
            padding: 12px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            margin: 6px 0;
            border-radius: 12px;
        }
        
        .history-distance {
            font-size: 16px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .history-time {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        
        .history-empty {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 40px;
        }
        
        .calibration-badge {
            position: fixed;
            bottom: 120px;
            right: 16px;
            background: rgba(76, 175, 80, 0.9);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="crosshair">
            <div class="crosshair-circle"></div>
        </div>
        
        <div class="instruction" id="instruction">
            👆 Press and drag to measure
        </div>
        
        <div class="overlay">
            <div class="distance-card">
                <div class="distance-label">DISTANCE</div>
                <div class="distance-value">
                    <span id="distanceValue">0.00</span>
                    <span class="distance-unit">cm</span>
                </div>
            </div>
            
            <div class="button-group">
                <button id="calibrateBtn">📐 Calibrate</button>
                <button id="historyBtn">📊 History</button>
                <button id="shareBtn">📤 Share</button>
                <button id="clearBtn">🗑️ Clear</button>
            </div>
            
            <div class="status" id="status">
                Press and drag to measure
            </div>
        </div>
        
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span class="history-title">📊 History</span>
                <button class="history-close" id="closeHistoryBtn">✕</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">No measurements yet</div>
            </div>
        </div>
        
        <div class="calibration-badge" id="calibrationBadge" style="display: none;">
            ✓ Calibrated
        </div>
    </div>

    <script>
        // DOM elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const distanceValue = document.getElementById('distanceValue');
        const instruction = document.getElementById('instruction');
        const status = document.getElementById('status');
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');
        const calibrationBadge = document.getElementById('calibrationBadge');
        
        // State
        let measurements = [];
        let calibrationFactor = 1.0;
        let isDragging = false;
        let dragStart = null;
        let dragCurrent = null;
        let isEditing = false;
        let editingMeasurement = null;
        let editingPoint = null;
        
        let focalLength = 800;
        let referenceWidth = 30;
        
        // Gentle feedback (no flashes, no seizures)
        function gentleFeedback(x, y) {
            // Just a subtle expanding dot at touch point
            const dot = document.createElement('div');
            dot.className = 'feedback-dot';
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
            document.body.appendChild(dot);
            setTimeout(() => dot.remove(), 300);
        }
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                await video.play();
                
                resizeCanvas();
                requestAnimationFrame(draw);
                
                status.textContent = 'Ready! Press and drag to measure';
                instruction.textContent = '👆 Press and drag to measure | Tap circle to edit';
                
            } catch (err) {
                status.textContent = '⚠️ Camera access required';
                instruction.textContent = 'Please allow camera access';
            }
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function draw() {
            if (!video.videoWidth) {
                requestAnimationFrame(draw);
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            measurements.forEach(measure => {
                drawMeasurement(measure);
            });
            
            if (isDragging && dragStart && dragCurrent) {
                drawDragLine(dragStart, dragCurrent);
                
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                const liveDistance = calculateDistance(pixelDistance);
                
                const midX = (dragStart.x + dragCurrent.x) / 2;
                const midY = (dragStart.y + dragCurrent.y) / 2 - 20;
                drawText(`${liveDistance.toFixed(1)} cm`, midX, midY, '#FFD700', 'bold 18px');
                
                drawPoint(dragStart, '#4CAF50', 'A', 'Start');
                drawPoint(dragCurrent, '#FF5252', 'B', 'End');
            }
            
            if (isEditing && editingMeasurement) {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#FFD700';
                drawPoint(editingMeasurement.start, '#FFD700', 'A', 'Start');
                drawPoint(editingMeasurement.end, '#FFD700', 'B', 'End');
                ctx.restore();
            }
            
            requestAnimationFrame(draw);
        }
        
        function drawPoint(point, color, label, text) {
            ctx.beginPath();
            ctx.arc(point.x, point.y, 16, 0, 2 * Math.PI);
            ctx.fillStyle = color + '60';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.font = 'bold 14px -apple-system';
            ctx.shadowBlur = 3;
            ctx.shadowColor = 'black';
            ctx.fillText(label, point.x + 18, point.y - 10);
            ctx.font = '11px -apple-system';
            ctx.fillText(text, point.x + 18, point.y + 5);
        }
        
        function drawDragLine(p1, p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 5;
            ctx.setLineDash([8, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawLine(p1, p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawText(text, x, y, color, font) {
            ctx.fillStyle = color;
            ctx.font = font;
            ctx.shadowBlur = 3;
            ctx.shadowColor = 'black';
            ctx.fillText(text, x, y);
        }
        
        function drawMeasurement(measure) {
            drawPoint(measure.start, '#9C27B0', measure.id.toString(), '');
            drawPoint(measure.end, '#9C27B0', measure.id.toString(), '');
            drawLine(measure.start, measure.end);
            const midX = (measure.start.x + measure.end.x) / 2;
            const midY = (measure.start.y + measure.end.y) / 2;
            drawText(`${measure.distance.toFixed(1)} cm`, midX, midY - 12, '#9C27B0', 'bold 14px');
        }
        
        function calculateDistance(pixelDistance) {
            let estimatedCm = (pixelDistance / focalLength) * referenceWidth;
            estimatedCm *= calibrationFactor;
            return Math.min(Math.max(estimatedCm, 0), 500);
        }
        
        function updateMeasurementDistance(measure) {
            const dx = measure.start.x - measure.end.x;
            const dy = measure.start.y - measure.end.y;
            const pixelDistance = Math.sqrt(dx * dx + dy * dy);
            measure.distance = calculateDistance(pixelDistance);
            return measure.distance;
        }
        
        function updateHistoryDisplay() {
            if (measurements.length === 0) {
                historyList.innerHTML = '<div class="history-empty">No measurements yet</div>';
                return;
            }
            
            historyList.innerHTML = measurements.slice(0, 20).map(m => `
                <div class="history-item">
                    <span class="history-distance">📏 ${m.distance.toFixed(1)} cm</span>
                    <span class="history-time">${m.time}</span>
                </div>
            `).join('');
        }
        
        function findPointAt(x, y) {
            const threshold = 35;
            for (let i = 0; i < measurements.length; i++) {
                const m = measurements[i];
                
                const startDx = m.start.x - x;
                const startDy = m.start.y - y;
                if (Math.sqrt(startDx * startDx + startDy * startDy) < threshold) {
                    return { measurement: m, point: 'start' };
                }
                
                const endDx = m.end.x - x;
                const endDy = m.end.y - y;
                if (Math.sqrt(endDx * endDx + endDy * endDy) < threshold) {
                    return { measurement: m, point: 'end' };
                }
            }
            return null;
        }
        
        function onTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            gentleFeedback(touch.clientX, touch.clientY);
            
            const hit = findPointAt(x, y);
            
            if (hit) {
                isEditing = true;
                editingMeasurement = hit.measurement;
                editingPoint = hit.point;
                instruction.textContent = `✏️ Moving point - drag to reposition`;
                status.textContent = 'Drag to move the point';
            } else {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                instruction.textContent = '📍 Drag to measure distance';
                status.textContent = 'Drag to draw line';
            }
        }
        
        function onTouchMove(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            if (isDragging && dragStart) {
                dragCurrent = { x, y };
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                const liveDistance = calculateDistance(pixelDistance);
                distanceValue.textContent = liveDistance.toFixed(2);
            }
            
            if (isEditing && editingMeasurement && editingPoint) {
                if (editingPoint === 'start') {
                    editingMeasurement.start = { x, y };
                } else {
                    editingMeasurement.end = { x, y };
                }
                const newDistance = updateMeasurementDistance(editingMeasurement);
                distanceValue.textContent = newDistance.toFixed(2);
                status.textContent = `${newDistance.toFixed(1)} cm`;
                updateHistoryDisplay();
            }
        }
        
        function onTouchEnd(e) {
            e.preventDefault();
            
            if (isDragging && dragStart && dragCurrent) {
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                const finalDistance = calculateDistance(pixelDistance);
                
                const measurement = {
                    id: measurements.length + 1,
                    start: { ...dragStart },
                    end: { ...dragCurrent },
                    distance: finalDistance,
                    time: new Date().toLocaleTimeString()
                };
                
                measurements.unshift(measurement);
                distanceValue.textContent = finalDistance.toFixed(2);
                instruction.textContent = '✓ Saved! Press and drag again';
                status.textContent = `${finalDistance.toFixed(1)} cm measured`;
                updateHistoryDisplay();
            }
            
            if (isEditing && editingMeasurement) {
                instruction.textContent = '✓ Point moved! Press and drag to measure';
                status.textContent = `Updated: ${editingMeasurement.distance.toFixed(1)} cm`;
            }
            
            isDragging = false;
            isEditing = false;
            dragStart = null;
            dragCurrent = null;
            editingMeasurement = null;
            editingPoint = null;
            
            setTimeout(() => {
                if (!isDragging && !isEditing) {
                    instruction.textContent = '👆 Press and drag to measure | Tap circle to edit';
                }
            }, 2000);
        }
        
        function startCalibration() {
            instruction.textContent = '📐 Drag across a ~8.5cm object (credit card width)';
            status.textContent = 'Drag to calibrate';
            
            let calStart = null;
            let calEnd = null;
            
            const handleCalStart = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
                const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
                calStart = { x, y };
                gentleFeedback(touch.clientX, touch.clientY);
            };
            
            const handleCalEnd = (e) => {
                if (!calStart || !calEnd) {
                    cleanup();
                    return;
                }
                
                e.preventDefault();
                const dx = calStart.x - calEnd.x;
                const dy = calStart.y - calEnd.y;
                const pixelDistance = Math.sqrt(dx * dx + dy * dy);
                
                if (pixelDistance > 30) {
                    const assumedCm = 8.5;
                    const rawCm = (pixelDistance / focalLength) * referenceWidth;
                    calibrationFactor = assumedCm / rawCm;
                    
                    calibrationBadge.style.display = 'block';
                    setTimeout(() => {
                        calibrationBadge.style.opacity = '0';
                        setTimeout(() => {
                            calibrationBadge.style.display = 'none';
                            calibrationBadge.style.opacity = '1';
                        }, 500);
                    }, 3000);
                    
                    status.textContent = `✓ Calibrated!`;
                    instruction.textContent = '👆 Press and drag to measure';
                } else {
                    status.textContent = '❌ Drag a longer distance';
                }
                
                cleanup();
            };
            
            const handleCalMove = (e) => {
                if (!calStart) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
                const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
                calEnd = { x, y };
                
                ctx.beginPath();
                ctx.moveTo(calStart.x, calStart.y);
                ctx.lineTo(calEnd.x, calEnd.y);
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.stroke();
            };
            
            const cleanup = () => {
                canvas.removeEventListener('touchstart', handleCalStart);
                canvas.removeEventListener('touchmove', handleCalMove);
                canvas.removeEventListener('touchend', handleCalEnd);
            };
            
            canvas.addEventListener('touchstart', handleCalStart);
            canvas.addEventListener('touchmove', handleCalMove);
            canvas.addEventListener('touchend', handleCalEnd);
        }
        
        async function shareMeasurements() {
            if (measurements.length === 0) {
                status.textContent = 'No measurements to share';
                setTimeout(() => status.textContent = 'Press and drag to measure', 2000);
                return;
            }
            
            const summary = measurements.slice(0, 10).map((m, i) => 
                `${i+1}. ${m.distance.toFixed(1)} cm`
            ).join('\n');
            
            const shareText = `📏 Measurements:\n${summary}\n\nTotal: ${measurements.length}`;
            
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'My Measurements', text: shareText });
                    status.textContent = 'Shared!';
                } catch (err) {
                    status.textContent = 'Cancelled';
                }
            } else {
                await navigator.clipboard.writeText(shareText);
                status.textContent = 'Copied!';
            }
            
            setTimeout(() => {
                if (!isDragging && !isEditing) status.textContent = 'Press and drag to measure';
            }, 2000);
        }
        
        function toggleHistory() {
            historyPanel.classList.toggle('open');
        }
        
        function closeHistory() {
            historyPanel.classList.remove('open');
        }
        
        function clearAll() {
            measurements = [];
            distanceValue.textContent = '0.00';
            instruction.textContent = '👆 Press and drag to measure | Tap circle to edit';
            status.textContent = 'All cleared';
            updateHistoryDisplay();
            closeHistory();
        }
        
        // Event listeners
        canvas.addEventListener('touchstart', onTouchStart);
        canvas.addEventListener('touchmove', onTouchMove);
        canvas.addEventListener('touchend', onTouchEnd);
        
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('calibrateBtn').addEventListener('click', startCalibration);
        document.getElementById('historyBtn').addEventListener('click', toggleHistory);
        document.getElementById('closeHistoryBtn').addEventListener('click', closeHistory);
        document.getElementById('shareBtn').addEventListener('click', shareMeasurements);
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        
        initCamera();
        updateHistoryDisplay();
    </script>
</body>
</html>
